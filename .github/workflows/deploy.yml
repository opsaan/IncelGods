name: Deploy TrucelGods to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REPO_BASE: /IncelGods/
      - name: Deploy dist to gh-pages branch (git)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          if git ls-remote --exit-code --heads origin gh-pages; then
            git switch --detach
            git worktree add /tmp/gh-pages gh-pages
          else
            git switch --detach --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p /tmp/gh-pages
            git worktree add /tmp/gh-pages
          fi
          rm -rf /tmp/gh-pages/*
          cp -r dist/. /tmp/gh-pages/
          cd /tmp/gh-pages
          touch .nojekyll
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:gh-pages --force
